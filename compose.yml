# Collector runs on a REMOTE box (3.96.147.26:8088). This stack is the proxy only;
# it reports there via INFERENCEIQ_DASHBOARD. To run a local collector instead, see
# the standalone command in CLAUDE.md / README.
services:
  intercept:                       # ⚡ Auto optimizing proxy on :8082
    build:
      context: .                   # repo root, so the image can copy engines/ + proxy/
      dockerfile: proxy/Dockerfile
    command: uvicorn intercept:app --host 0.0.0.0 --port 8082
    ports:
      - "8082:8082"
    environment:
      # Master switch: 0 makes the proxy a pure passthrough (no input optimize).
      - OPTIMIZE_ENABLED=${OPTIMIZE_ENABLED:-1}
      # Upstream API base (override for tests / self-host). Default api.anthropic.com.
      - ANTHROPIC_UPSTREAM=${ANTHROPIC_UPSTREAM:-https://api.anthropic.com}
      # dashboard token-savings counter: "estimate" (instant, chars/4) | "exact" (count_tokens, background)
      - COUNT_MODE=${COUNT_MODE:-estimate}
      # The one best mode: optimize input AND shorten output by default. CONCISE=0 to disable.
      - CONCISE=${CONCISE:-1}
      # Tune the brevity strength (bigger lever = harder wording). Empty = code default.
      - CONCISE_NOTE=${CONCISE_NOTE:-}
      # Intent-based model routing: on (default, override) | advise (report only) | off.
      # Agentic requests (tools / tool_result) are never routed, so Claude Code is unaffected.
      - ROUTE_MODELS=${ROUTE_MODELS:-on}
      # Privacy: 0 = report counts + host only; 1 = also send prompt text to the dashboard.
      - IQ_REPORT_TEXT=${IQ_REPORT_TEXT:-0}
      # Send this token to a token-protected collector (must match the dashboard's IQ_TOKEN).
      - IQ_TOKEN=${IQ_TOKEN:-}
      # Report as the host machine (not the container id) so proxy + hook share one host row.
      - IQ_HOST=${IQ_HOST:-}
      # Semantic cache (3-layer). On by default; non-agentic text-only traffic only.
      - CACHE_ENABLED=${CACHE_ENABLED:-1}
      - CACHE_INDEX=${CACHE_INDEX:-numpy}      # numpy (default) | hnsw | faiss
      - CACHE_HIT=${CACHE_HIT:-0.92}           # cosine similarity to serve a hit
      - CACHE_SOFT=${CACHE_SOFT:-0.88}         # [soft,hit) = near-miss (logged, not served)
      - CACHE_DEDUP=${CACHE_DEDUP:-0.97}       # ≥ on store → merge instead of insert
      - CACHE_MAX_MB=${CACHE_MAX_MB:-50}       # store budget (embeddings + responses)
      - CACHE_PER_MODEL=${CACHE_PER_MODEL:-0}  # 1 = namespace cache per requested model
      - CACHE_MODEL=${CACHE_MODEL:-BAAI/bge-small-en-v1.5}   # local ONNX embedding model
      - CACHE_PERSIST_PATH=${CACHE_PERSIST_PATH:-/cache/store.json}
      # Where the PROXY reports — the remote/central collector (override in .env).
      - INFERENCEIQ_DASHBOARD=${INFERENCEIQ_DASHBOARD:-http://3.96.147.26:8088}
      # Where the proxy's /dashboard redirects a browser (host-visible URL).
      - DASHBOARD_PUBLIC_URL=${DASHBOARD_PUBLIC_URL:-http://3.96.147.26:8088}
    volumes:
      - iq_models:/models     # cached ONNX embedding model (avoid re-download on restart)
      - iq_cache:/cache        # persisted semantic-cache store
    restart: unless-stopped

volumes:
  iq_models:
  iq_cache:
