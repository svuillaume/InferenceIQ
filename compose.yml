# InferenceIQ auto-optimizing proxy (:8082). Reports to a remote collector via
# INFERENCEIQ_DASHBOARD; for a local collector see CLAUDE.md / README.
services:
  intercept:
    build:
      context: .                 # repo root, so the image can copy core-engine/ + proxy/
      dockerfile: proxy/Dockerfile
    command: uvicorn intercept:app --host 0.0.0.0 --port 8082
    ports:
      - "8082:8082"
    environment:
      # --- Core optimization ---
      - OPTIMIZE_ENABLED=${OPTIMIZE_ENABLED:-1}   # 0 = pure passthrough
      - CONCISE=${CONCISE:-1}                      # optimize input + shorten output; 0 = off
      - CONCISE_NOTE=${CONCISE_NOTE:-}             # brevity strength; empty = code default
      - ROUTE_MODELS=${ROUTE_MODELS:-on}           # on | advise | off (agentic reqs never routed)

      # --- Upstream & counting ---
      - ANTHROPIC_UPSTREAM=${ANTHROPIC_UPSTREAM:-https://api.anthropic.com}
      - COUNT_MODE=${COUNT_MODE:-estimate}         # estimate (chars/4) | exact (count_tokens)

      # --- Semantic cache (non-agentic, text-only) ---
      - CACHE_ENABLED=${CACHE_ENABLED:-1}
      - CACHE_INDEX=${CACHE_INDEX:-numpy}          # numpy | hnsw | faiss
      - CACHE_HIT=${CACHE_HIT:-0.92}               # cosine sim to serve a hit
      - CACHE_SOFT=${CACHE_SOFT:-0.88}             # [soft,hit) = near-miss (logged only)
      - CACHE_DEDUP=${CACHE_DEDUP:-0.97}           # >= on store -> merge
      - CACHE_MAX_MB=${CACHE_MAX_MB:-50}           # embeddings + responses budget
      - CACHE_PER_MODEL=${CACHE_PER_MODEL:-0}      # 1 = namespace per model
      - CACHE_MODEL=${CACHE_MODEL:-BAAI/bge-small-en-v1.5}
      - CACHE_PERSIST_PATH=${CACHE_PERSIST_PATH:-/cache/store.json}

      # --- Reporting & dashboard ---
      # Set DASHBOARD_URL as the single source of truth; override the two below
      # only when they must differ (e.g. local Docker: report to
      # host.docker.internal:8088 but redirect the browser to localhost:8088).
      - IQ_REPORT_TEXT=${IQ_REPORT_TEXT:-0}        # 1 = also send prompt text
      - IQ_TOKEN=${IQ_TOKEN:-}                     # must match collector's IQ_TOKEN
      - IQ_HOST=${IQ_HOST:-}                       # report as host, not container id
      - INFERENCEIQ_DASHBOARD=${INFERENCEIQ_DASHBOARD:-${DASHBOARD_URL:-http://3.96.147.26:8088}}
      - DASHBOARD_PUBLIC_URL=${DASHBOARD_PUBLIC_URL:-${DASHBOARD_URL:-http://3.96.147.26:8088}}
    volumes:
      - iq_models:/models   # cached ONNX embedding model
      - iq_cache:/cache     # persisted semantic-cache store
    restart: unless-stopped

volumes:
  iq_models:
  iq_cache:
